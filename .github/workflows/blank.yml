name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  test-sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias de test
        run: |
          python3 -m venv env-test
          source env-test/bin/activate
          pip install -U pip
          pip install -r requirements.txt

      - name: Ejecutar tests sincronizados
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          source env-test/bin/activate
          pytest -v tests/ --maxfail=1 --disable-warnings
          
            
  deploy-ec2:
    runs-on: ubuntu-latest
    needs: [test-sync]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail

            # Ir al repo
            cd /home/ubuntu/App || exit 1
            git fetch --all
            git reset --hard origin/main

            # --- Backend: venv e instalaciones ---
            cd /home/ubuntu/App/Backend

            # Crear/actualizar virtualenv en Backend/venv
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            # Activar e instalar dependencias
            source venv/bin/activate
            pip install -U pip
            pip install -r requirements.txt

            # (Opcional) Inicializar BD si el proyecto lo requiere
            # source venv/bin/activate && python -c "from database.db import init_db; init_db()"

            # --- Escribir .env (sobreescribe) ---
            cat > /home/ubuntu/App/Backend/.env <<EOF
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            ATHENA_DATABASE=${{ secrets.ATHENA_DATABASE }}
            ATHENA_TABLE=${{ secrets.ATHENA_TABLE }}
            S3_OUTPUT_BUCKET=${{ secrets.S3_OUTPUT_BUCKET }}
            EOF
            
            # Asegurar permisos de lectura para el usuario ubuntu
            sudo chown ubuntu:ubuntu /home/ubuntu/App/Backend/.env
            sudo chmod 600 /home/ubuntu/App/Backend/.env

            # --- Frontend: instalar node si falta y build ---
            # Instalar Node.js 18.x si npm no está presente
            if ! command -v npm >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt-get install -y nodejs build-essential
            fi

            # Construir frontend (producción) y poner dist en lugar correcto
            cd /home/ubuntu/App/frontend/frontend
            npm ci
            npm run build

            # Ajustar permisos para que nginx (www-data) pueda servir los archivos
            sudo chown -R ubuntu:www-data /home/ubuntu/App/frontend/frontend/dist
            sudo find /home/ubuntu/App/frontend/frontend/dist -type d -exec chmod 755 {} +
            sudo find /home/ubuntu/App/frontend/frontend/dist -type f -exec chmod 644 {} +

            # --- Reiniciar servicios --- 
            # Recargar systemd (por si hubo cambios en unidades)
            sudo systemctl daemon-reload || true

            # Reiniciar backend (systemd unit debe existir en la instancia)
            sudo systemctl restart backend.service
            sudo systemctl enable backend.service || true

            # Si tienes un servicio frontend dev corriendo (opcional), detenerlo
            sudo systemctl stop frontend.service || true

            # Reiniciar nginx para recargar config y servir nuevo dist
            sudo systemctl restart nginx
            sudo systemctl enable nginx || true

            # Breve comprobación
            sleep 2
            echo "Backend status:"
            sudo systemctl status backend.service --no-pager || true
            echo "Nginx status:"
            sudo systemctl status nginx --no-pager || true